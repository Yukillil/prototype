<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype Index</title>
    <style>
      :root {
        --paper: #f4ead7;
        --ink: #26221c;
        --muted: #817461;
        --line: #cdbd9f;
        --card: #fff8ea;
        --mono: "IBM Plex Mono", "SFMono-Regular", "Roboto Mono", "Courier New", monospace;
        --sans: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        color: var(--ink);
        font-family: var(--sans);
        background:
          linear-gradient(rgba(92, 71, 41, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(92, 71, 41, 0.04) 1px, transparent 1px),
          var(--paper);
        background-size: 18px 18px;
      }

      main {
        width: min(100%, 760px);
        min-height: 100dvh;
        margin: 0 auto;
        padding: 52px 22px;
        display: grid;
        align-content: center;
        gap: 34px;
      }

      .kicker {
        font-family: var(--mono);
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 620px;
        font-size: clamp(54px, 12vw, 104px);
        line-height: 0.88;
        letter-spacing: -0.06em;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      a {
        min-height: 164px;
        padding: 18px;
        display: grid;
        align-content: space-between;
        color: inherit;
        text-decoration: none;
        border: 1px solid rgba(74, 58, 34, 0.2);
        border-radius: 18px;
        background: rgba(255, 248, 234, 0.72);
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      a:hover {
        transform: translateY(-2px);
        border-color: var(--ink);
        background: var(--card);
      }

      .no {
        font-family: var(--mono);
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
      }

      h2 {
        margin: 0;
        font-size: 30px;
        line-height: 1;
        letter-spacing: -0.05em;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <div class="kicker">Yukillil / Prototype Shelf</div>
        <h1>Prototype Index</h1>
      </div>

      <section class="grid" aria-label="Prototype list">
        <a href="./plantti/">
          <span class="no">NO.01 / LIVE</span>
          <span>
            <h2>果蔬TI</h2>
            <p>五道题试试你的果蔬人格，含图鉴与结果页。</p>
          </span>
        </a>
      </section>
    </main>
  </body>
</html>
